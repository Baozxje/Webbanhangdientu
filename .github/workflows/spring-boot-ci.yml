name: Spring Boot CI/CD Pipeline

on:
  push:
    branches: [ "main", "back" ]
  pull_request:
    branches: [ "main", "back" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Set up JDK 25
        uses: actions/setup-java@v3
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests #tam thoi bo qua test :>